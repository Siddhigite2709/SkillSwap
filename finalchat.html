<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat - SkillSwap</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: #fefefe;
      color: #333;
      transition: background 0.3s, color 0.3s;
    }

    header {
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      padding: 20px;
      text-align: center;
      position: relative;
      color: #2b4f60;
    }
    header h1 { margin: 0; font-size: 1.8rem; }

    /* Sidebar Button */
    .sidebar-btn {
      font-size: 26px;
      cursor: pointer;
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      background: #2b4f60;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      z-index: 4;
    }
    .sidebar-btn:hover { background: #13597a; }

    /* Dark Mode Button */
    .dark-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #2b4f60;
      color: white;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .dark-btn:hover { background: #13597a; }

    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 3;
      top: 0;
      left: 0;
      background-color: #2b4f60;
      overflow-y: auto;
      transition: 0.3s;
      padding-top: 60px;
    }
    .sidebar a {
      padding: 12px 20px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
      transition: 0.3s;
    }
    .sidebar a:hover { background-color: #13597a; }
    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 24px;
      color: white;
      cursor: pointer;
    }

    /* Chat Container */
    .chat-container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 70vh;
      overflow: hidden;
    }
    #chatBox {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .message {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      max-width: 75%;
      word-wrap: break-word;
    }
    .message.user { background: #66a6ff; color: white; margin-left: auto; }
    .message.bot { background: #eee; color: #333; margin-right: auto; }

    .input-area {
      display: flex;
      padding: 15px;
      border-top: 1px solid #ddd;
    }
    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    .input-area button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2b4f60;
      color: white;
    }
    .input-area button:hover { background: #13597a; }

    /* Dark Mode */
    body.dark-mode { background: #1c1c1c; color: #eee; }
    body.dark-mode header { background: linear-gradient(135deg, #141E30, #243B55); color: #eee; }
    body.dark-mode .chat-container { background: #333; color: #eee; }
    body.dark-mode .message.bot { background: #444; color: #eee; }
    body.dark-mode .message.user { background: #13597a; }
    body.dark-mode input { background: #222; border: 1px solid #555; color: #eee; }
  </style>
</head>
<body>

  <!-- Sidebar Button -->
  <button class="sidebar-btn" onclick="openSidebar()">☰</button>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <span class="close-btn" onclick="closeSidebar()">×</span>
    <a href="finalhomepage.html">Home</a>
    <a href="finalabout.html">About Us</a>
    <a href="finalskills.html">All Skills</a>
    <a href="finalcontact.html">Contact</a>
    <a href="finallogin.html">Login</a>
    <a href="finalsignup.html">Sign Up</a>
    <a href="finalprofile.html">Profile</a>
    <a href="finalscheduler.html">Scheduler</a>
    <a href="finalchat.html">Chat</a>
    <a href="finalfaq.html">Help/FAQ</a>
    <a href="finalevents.html">Events</a>
    <a href="finaldashboard.html">Dashboard</a>
  </div>

  <!-- Header -->
  <header>
    <h1>SkillSwap Chat 💬</h1>
    <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
  </header>

  <!-- Chat -->
  <div class="chat-container">
    <div id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
      <button onclick="clearChat()">Clear</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    // Fallback bot replies
    const botReplies = [
      "That's interesting! Tell me more.",
      "I totally agree with you.",
      "Can you explain that again?",
      "Wow, that sounds amazing!",
      "Thanks for sharing this with me!",
      "Haha, that's funny 😄"
    ];

    // Bot logic
    function getBotReply(userText) {
      const text = userText.toLowerCase();
      if (text.includes("hi") || text.includes("hello") || text.includes("hey")) {
        return "Hello 👋! How are you doing today?";
      } else if (text.includes("how are you")) {
        return "I'm doing great, thanks for asking! How about you?";
      } else if (text.includes("skill") || text.includes("skillswap")) {
        return "SkillSwap is a platform where people exchange and learn skills from each other 🚀.";
      } else if (text.includes("bye")) {
        return "Goodbye! 👋 Come back soon!";
      } else {
        return botReplies[Math.floor(Math.random() * botReplies.length)];
      }
    }

    // Load old messages
    const savedMessages = JSON.parse(localStorage.getItem("chatMessages")) || [];
    savedMessages.forEach(msg => addMessage(msg.text, msg.sender, false));

    // Add message
    function addMessage(text, sender, save = true) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", sender);
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      if (save) {
        savedMessages.push({ text, sender });
        localStorage.setItem("chatMessages", JSON.stringify(savedMessages));
      }
    }

    // Send message
    function sendMessage() {
      const message = userInput.value.trim();
      if (message === "") return;
      addMessage(message, "user");
      userInput.value = "";
      setTimeout(() => {
        const botReply = getBotReply(message);
        addMessage(botReply, "bot");
      }, 600);
    }

    // Clear chat
    function clearChat() {
      chatBox.innerHTML = "";
      localStorage.removeItem("chatMessages");
      savedMessages.length = 0;
    }

    // Sidebar toggle
    function openSidebar() { document.getElementById("sidebar").style.width = "260px"; }
    function closeSidebar() { document.getElementById("sidebar").style.width = "0"; }

    // Dark mode persistence
    if (localStorage.getItem("darkMode") === "enabled") {
      document.body.classList.add("dark-mode");
    }
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode",
        document.body.classList.contains("dark-mode") ? "enabled" : "disabled"
      );
    }
  </script>

</body>
</html>
